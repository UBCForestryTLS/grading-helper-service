name: ci
on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Run tests
        run: uv run pytest tests/ -v

  changes:
    # Detects whether the push touched application code or only docs, so the
    # deploy and deploy-docs jobs below can skip when nothing relevant changed
    # (avoids redundant sam builds / mkdocs publishes for docs-only or
    # code-only commits).
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'template.yaml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.changes.outputs.code == 'true'
    needs: [test, changes]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Export requirements
        run: uv export --no-hashes --no-dev -o requirements.txt
      - name: SAM build
        run: sam build
      - name: SAM deploy
        # samconfig.toml is gitignored (it holds ApiClientSecret), so pass
        # all deploy parameters explicitly here. The Canvas API client secret
        # comes from the production environment's GitHub Actions secrets.
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name grading-helper-service \
            --region ca-central-1 \
            --resolve-s3 \
            --s3-prefix grading-helper-service \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              Stage=dev \
              BaseUrl=https://pcvifjrm5g.execute-api.ca-central-1.amazonaws.com/dev \
              AllowedOrigin=https://pcvifjrm5g.execute-api.ca-central-1.amazonaws.com \
              LtiIss=https://canvas.instructure.com \
              LtiClientId=${{ secrets.LTI_CLIENT_ID }} \
              LtiDeploymentId=${{ secrets.LTI_DEPLOYMENT_ID }} \
              LtiAuthLoginUrl=https://sso.canvaslms.com/api/lti/authorize_redirect \
              LtiAuthTokenUrl=https://sso.canvaslms.com/login/oauth2/token \
              LtiKeySetUrl=https://sso.canvaslms.com/api/lti/security/jwks \
              ApiClientId=${{ secrets.API_CLIENT_ID }} \
              ApiClientSecret=${{ secrets.API_CLIENT_SECRET }} \
              ApiCanvasUrl=https://ubcstaging.instructure.com \
              BedrockModelId=us.anthropic.claude-haiku-4-5-20251001-v1:0

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.changes.outputs.docs == 'true'
    needs: [test, changes]
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
