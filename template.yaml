AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI-powered grading assistant for UBC Forestry courses

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64
    Environment:
      Variables:
        TABLE_NAME: !Ref GradingTable
        BUCKET_NAME: !Ref GradingBucket
        STAGE: !Ref Stage
        POWERTOOLS_SERVICE_NAME: grading-helper
        BASE_URL: !Ref BaseUrl
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        LTI_ISS: !Ref LtiIss
        LTI_CLIENT_ID: !Ref LtiClientId
        LTI_DEPLOYMENT_ID: !Ref LtiDeploymentId
        LTI_AUTH_LOGIN_URL: !Ref LtiAuthLoginUrl
        LTI_AUTH_TOKEN_URL: !Ref LtiAuthTokenUrl
        LTI_KEY_SET_URL: !Ref LtiKeySetUrl
        API_CLIENT_ID: !Ref ApiClientId
        API_CLIENT_SECRET: !Ref ApiClientSecret
        API_CANVAS_URL: !Ref ApiCanvasUrl

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  BaseUrl:
    Type: String
    Default: ""
    Description: Public base URL of the API (e.g. https://xxx.execute-api.ca-central-1.amazonaws.com/dev)
  BedrockModelId:
    Type: String
    Default: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    Description: Bedrock model ID for AI grading
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin (set to API Gateway URL in production)
  LtiIss:
    Type: String
    Default: ""
    Description: LTI platform issuer (https://canvas.instructure.com)
  LtiClientId:
    Type: String
    Default: ""
    Description: LTI Developer Key client_id from Canvas admin
  LtiDeploymentId:
    Type: String
    Default: ""
    Description: LTI deployment_id from Canvas admin
  LtiAuthLoginUrl:
    Type: String
    Default: ""
    Description: Canvas OIDC auth redirect URL
  LtiAuthTokenUrl:
    Type: String
    Default: ""
    Description: Canvas OAuth2 token endpoint
  LtiKeySetUrl:
    Type: String
    Default: ""
    Description: Canvas public JWKS URL
  ApiClientId:
    Type: String
    Default: ""
    Description: Canvas API Developer Key client_id (for REST API OAuth2)
  ApiClientSecret:
    Type: String
    Default: ""
    Description: Canvas API Developer Key client_secret (for REST API OAuth2)
  ApiCanvasUrl:
    Type: String
    Default: ""
    Description: Canvas instance base URL (e.g. https://ubcstaging.instructure.com)

Resources:
  # --- API Gateway ---
  ApiGateway:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      DefaultRouteSettings:
        ThrottlingBurstLimit: 10
        ThrottlingRateLimit: 5
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  # --- Lambda Function ---
  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src/handlers/api.handler
      CodeUri: .
      Description: Main API handler for grading assistant
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GradingTable
        - S3CrudPolicy:
            BucketName: !Ref GradingBucket
        - SSMParameterReadPolicy:
            ParameterName: grading-helper/lti-private-key
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}"
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY

  # --- DynamoDB Table (Single-Table Design) ---
  GradingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- S3 Bucket ---
  GradingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldBatchFiles
            Status: Enabled
            ExpirationInDays: 90
            Prefix: batch/

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  GradingTableName:
    Description: DynamoDB table name
    Value: !Ref GradingTable
  GradingBucketName:
    Description: S3 bucket name
    Value: !Ref GradingBucket
